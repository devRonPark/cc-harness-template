  # 스택 블록 활성화 전까지 CI가 빈 job으로 실패하지 않도록 유지.
  # 스택 블록 주석 해제 후 이 job 삭제 + 아래 ci-ok의 needs를 [check, test]로 변경.
  placeholder:
    name: CI (스택 미설정 — ci.yml 블록 활성화 후 삭제)
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - run: echo "스택 블록 주석 해제 후 이 placeholder job 삭제 필요"

  # M6 (2026-07-04 감사): 스택 잡(check/test) 이름을 required check로 직접
  # 등록하면, 스택 블록을 켜거나 잡을 추가·삭제할 때마다 GitHub Settings →
  # Branches의 required check가 깨진다(존재하지 않는 체크를 영구 대기하거나
  # 무방비 상태가 됨). 이 job 하나만 required check로 등록하면 이름이
  # 절대 안 바뀐다 — 아래 needs만 스택 상태에 맞춰 갱신하면 된다.
  ci-ok:
    name: ci-ok
    if: always()
    needs: [placeholder]  # 스택 활성화 후: needs: [check, test]
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: 스택 잡 결과 집약
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "CI 실패 — 위 스택 잡 로그 확인"
            exit 1
          fi
          echo "CI 통과"
