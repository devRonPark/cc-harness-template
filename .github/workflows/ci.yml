# GitHub Actions CI — [PROJECT_NAME]
# 사용법: placeholder를 실제 check/test job으로 교체하고 ci-ok needs를 갱신한다.
# Branch protection required check는 고정 이름인 "ci-ok" 하나만 등록한다.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  placeholder:
    name: CI (스택 미설정 — 실제 check/test job으로 교체)
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - run: echo "프로젝트 스택에 맞는 check/test job을 추가하세요"

  ci-ok:
    name: ci-ok
    if: always()
    needs: [placeholder]  # 스택 활성화 후: needs: [check, test]
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: 스택 잡 결과 집약
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "CI 실패 — 위 스택 잡 로그 확인"
            exit 1
          fi
          echo "CI 통과"
