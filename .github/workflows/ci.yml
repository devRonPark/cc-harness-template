# GitHub Actions CI — [PROJECT_NAME]
#
# 사용법:
#   1. 프로젝트 기술 스택 블록의 주석을 해제한다.
#   2. 불필요한 블록은 삭제한다.
#   3. placeholder job을 삭제하고, 아래 ci-ok job의 `needs:` 목록을
#      [check, test]로 바꾼다. branch protection의 required check는
#      "ci-ok" 하나만 등록 — 이 이름은 스택 전환과 무관하게 고정이므로
#      GitHub Settings → Branches에서 다시 등록할 필요가 없다(M6/2026-07-04 감사).
#
# /harness-setup 실행 시 기술 스택 자동 감지 → 해당 블록 자동 주석 해제 제안.
#
# 보안 권장: uses: action@TAG 를 SHA로 고정 권장.
#   예) actions/checkout@v4 → actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
#   참고: gajae-code/.github/workflows/ci.yml

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

