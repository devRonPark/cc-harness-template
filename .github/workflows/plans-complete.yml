name: Plans Complete

# task/* 브랜치 PR이 머지되면 tasks/index.json의 해당 Task를 wip → done으로
# 자동 전환하고, scripts/sync_plans.py로 Plans.md를 재생성한다.

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  flip-status:
    name: WIP → 완료
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'task/')
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: tasks/index.json 상태 전환 후 main에 반영 (push 우선, protection 시 PR 폴백)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [[ ! "$HEAD_REF" =~ ^task/([0-9]+\.[0-9]+(\.[0-9]+)?)- ]]; then
            echo "task/{X.Y}-* 패턴 아님 ($HEAD_REF) — skip"
            exit 0
          fi
          task_id="${BASH_REMATCH[1]}"

          python3 - "$task_id" <<'PY'
          import json
          import sys
          from pathlib import Path

          task_id = sys.argv[1]
          path = Path("tasks/index.json")
          document = json.loads(path.read_text(encoding="utf-8"))
          changed = False
          for task in document.get("tasks", []):
              if task.get("id") == task_id:
                  if task.get("status") != "wip":
                      print(f"Task {task_id}: wip 상태가 아님 ({task.get('status')}) — skip")
                      raise SystemExit(2)
                  task["status"] = "done"
                  changed = True
                  break
          if not changed:
              print(f"Task {task_id}: tasks/index.json에 없음 — skip")
              raise SystemExit(2)
          path.write_text(json.dumps(document, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY
          result=$?
          if [ "$result" -eq 2 ]; then
            exit 0
          fi
          if [ "$result" -ne 0 ]; then
            exit "$result"
          fi

          python3 scripts/validate_tasks.py
          python3 scripts/sync_plans.py

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tasks/index.json Plans.md
          git commit -m "chore: task ${task_id} 완료 반영 (PR #${PR_NUMBER} 머지)"

          # 동시 머지 경합 시 1회 rebase 재시도 — 그 이상 겹치면 수동 해결
          if git push origin main || (git pull --rebase origin main && git push origin main); then
            echo "main 직접 push 성공"
            exit 0
          fi

          echo "main 직접 push 실패 (branch protection 추정) — PR 자동 생성으로 폴백"
          flip_branch="bot/flip-${task_id}-${PR_NUMBER}"
          git checkout -b "$flip_branch"
          git push origin "$flip_branch"
          gh pr create \
            --title "chore: task ${task_id} 완료 반영 (자동)" \
            --body "PR #${PR_NUMBER} 머지에 따른 tasks/index.json 및 Plans.md 상태 자동 전환. main 직접 push가 branch protection에 막혀 PR로 폴백함. required reviews가 설정돼 있으면 수동 승인 1회 필요." \
            --base main --head "$flip_branch"
          gh pr merge "$flip_branch" --auto --squash \
            || echo "auto-merge 대기 — required reviews 등으로 즉시 머지 불가, 브랜치 ${flip_branch}의 PR을 수동 승인할 것"
