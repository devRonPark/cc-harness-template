name: Plans Complete

# task/* 브랜치 PR이 머지되면 Plans.md의 해당 Task를 cc:WIP → cc:완료로 자동 전환.
# 이게 없으면 머지 후 main에 stale WIP가 남아, 후속 모든 PR의 plans-guard가
# 남의 Task acceptance까지 재실행한다 (무관한 PR 차단 위험).
#
# H1 (2026-07-04 감사): "main 직접 push 차단" branch protection이 켜져 있으면
# 아래 bot의 main 직접 push도 함께 막혀 flip이 조용히 실패한다 — bypass
# actor 등록(rulesets)은 저장소마다 수동 설정이 필요해 기본값으로 강제하기
# 어려우므로, 대신 "direct push 우선 시도 → 실패 시 PR 자동 생성 + auto-merge
# 폴백" 방식을 택함. 장점: 별도 설정 없이 protection 유무 양쪽에서 동작.
# 한계: required reviews(승인 1건 이상)가 걸려 있으면 봇이 자기 PR을 승인할
# 수 없어 auto-merge가 대기 상태로 남는다 — 이 경우 수동 승인 1회 필요.
#
# 이 폴백이 동작하려면 저장소에 아래 두 설정이 켜져 있어야 한다(둘 다 기본값
# 꺼짐 — 실증 중 직접 부딪힌 전제조건):
#   1. Settings → Actions → General → "Allow GitHub Actions to create and
#      approve pull requests" — 꺼져 있으면 위 gh pr create 자체가
#      "GitHub Actions is not permitted to create or approve pull requests"로
#      실패한다.
#   2. Settings → General → Pull Requests → "Allow auto-merge" — 꺼져 있으면
#      gh pr merge --auto가 실패하고 PR이 열린 채로 남아 수동 병합이 필요하다
#      (아래 || echo 폴백 메시지로 안내됨 — 워크플로 자체는 실패로 보지 않음).
#
# harness-gh-test repo(public 임시 전환 + branch protection: PR 필수·승인
# 0건)에서 실제로 이 경로를 검증함: direct push 거부(GH006) → PR #9 자동
# 생성 확인 → 위 두 저장소 설정이 기본값(꺼짐)이라 PR 생성 최초 실패·
# auto-merge 대기를 각각 실제로 재현 → 설정 켠 뒤 수동 병합으로 cc:WIP →
# cc:완료 flip 최종 확인. 검증 후 protection·설정·repo 가시성 모두 원복.

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  flip-status:
    name: WIP → 완료
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'task/')
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Plans.md 상태 전환 후 main에 반영 (push 우선, protection 시 PR 폴백)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ ! -f Plans.md ]; then
            echo "Plans.md 없음 — skip"
            exit 0
          fi

          if [[ ! "$HEAD_REF" =~ ^task/([0-9]+\.[0-9]+(\.[0-9]+)?)- ]]; then
            echo "task/{X.Y}-* 패턴 아님 ($HEAD_REF) — skip"
            exit 0
          fi
          task_id="${BASH_REMATCH[1]}"
          task_id_re="${task_id//./\\.}"

          if ! grep -qE "^\|[[:space:]]*${task_id_re}[[:space:]]*\|.*cc:WIP" Plans.md; then
            echo "Task ${task_id}: cc:WIP 행 없음 (이미 완료 처리됐거나 마커 누락) — skip"
            exit 0
          fi

          sed -i -E "s/^(\|[[:space:]]*${task_id_re}[[:space:]]*\|.*)cc:WIP(.*)$/\1cc:완료\2/" Plans.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Plans.md
          git commit -m "chore: task ${task_id} 완료 반영 (PR #${PR_NUMBER} 머지)"

          # ponytail: 동시 머지 경합 시 1회 rebase 재시도 — 그 이상 겹치면 수동 해결
          if git push origin main || (git pull --rebase origin main && git push origin main); then
            echo "main 직접 push 성공"
            exit 0
          fi

          echo "main 직접 push 실패 (branch protection 추정) — PR 자동 생성으로 폴백"
          flip_branch="bot/flip-${task_id}-${PR_NUMBER}"
          git checkout -b "$flip_branch"
          git push origin "$flip_branch"
          gh pr create \
            --title "chore: task ${task_id} 완료 반영 (자동)" \
            --body "PR #${PR_NUMBER} 머지에 따른 Plans.md 상태 자동 전환. main 직접 push가 branch protection에 막혀 PR로 폴백함. required reviews가 설정돼 있으면 수동 승인 1회 필요." \
            --base main --head "$flip_branch"
          gh pr merge "$flip_branch" --auto --squash \
            || echo "auto-merge 대기 — required reviews 등으로 즉시 머지 불가, 브랜치 ${flip_branch}의 PR을 수동 승인할 것"
