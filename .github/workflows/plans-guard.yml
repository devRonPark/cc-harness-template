name: Plans Guard

on:
  pull_request:
    branches: [main]

concurrency:
  group: plans-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-tasks:
    name: tasks/index.json 검증
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Task JSON 스키마·의존성 검증
        run: python3 scripts/validate_tasks.py

      - name: Plans.md 동기화 확인
        run: python3 scripts/sync_plans.py --check

  tasks-diff-check:
    name: tasks/index.json Diff 보호
    needs: validate-tasks
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Task status 변경 범위 검증
        shell: bash
        env:
          HEAD_REF: ${{ github.head_ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git show "$BASE_SHA:tasks/index.json" > /tmp/base-tasks.json 2>/dev/null || echo '{"tasks":[]}' > /tmp/base-tasks.json
          python3 - <<'PY'
          import json
          import os
          import re
          import sys

          with open("/tmp/base-tasks.json", encoding="utf-8") as fh:
              base = {task["id"]: task for task in json.load(fh).get("tasks", [])}
          with open("tasks/index.json", encoding="utf-8") as fh:
              head = {task["id"]: task for task in json.load(fh).get("tasks", [])}

          owner = None
          match = re.match(r"^task/([0-9]+\.[0-9]+(\.[0-9]+)?)-", os.environ["HEAD_REF"])
          if match:
              owner = match.group(1)

          failed = False
          for task_id, task in sorted(head.items()):
              old_status = base.get(task_id, {}).get("status", "(new)")
              new_status = task.get("status")
              if old_status == new_status:
                  continue
              if new_status == "done":
                  print(f"✗ PR 안에서 Task {task_id}을(를) done으로 전환할 수 없습니다. 완료 전환은 plans-complete 봇 전용입니다.")
                  failed = True
              elif new_status == "wip":
                  if old_status != "todo":
                      print(f"✗ Task {task_id}: 비정상 status 전환 ({old_status} → wip)")
                      failed = True
                  elif owner is None:
                      print(f"✗ 비-task 브랜치({os.environ['HEAD_REF']})에서 Task {task_id} todo → wip 전환 감지")
                      failed = True
                  elif owner != task_id:
                      print(f"✗ Task {owner} 브랜치에서 타 Task {task_id}의 todo → wip 전환 감지")
                      failed = True
                  else:
                      print(f"✓ Task {task_id}: todo → wip 정상 전환")
          sys.exit(1 if failed else 0)
          PY

  wip-branch-check:
    name: WIP↔Branch
    needs: validate-tasks
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: PR 브랜치 ↔ tasks/index.json WIP 일관성 확인
        shell: bash
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [[ ! "$HEAD_REF" =~ ^task/([0-9]+\.[0-9]+(\.[0-9]+)?)- ]]; then
            echo "task/* 브랜치 아님 ($HEAD_REF) — skip"
            exit 0
          fi
          task_id="${BASH_REMATCH[1]}"
          python3 - "$task_id" <<'PY'
          import json
          import sys

          task_id = sys.argv[1]
          with open("tasks/index.json", encoding="utf-8") as fh:
              tasks = {task["id"]: task for task in json.load(fh).get("tasks", [])}
          task = tasks.get(task_id)
          if task and task.get("status") == "wip":
              print(f"✓ Task {task_id}: tasks/index.json wip 확인")
              raise SystemExit(0)
          print(f"✗ Task {task_id}: tasks/index.json에 wip Task 없음")
          raise SystemExit(1)
          PY

  acceptance-check:
    name: Acceptance Oracle
    needs: validate-tasks
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    # fork PR은 tasks/index.json에 임의 명령을 심어 CI에서 실행시킬 수 있으므로 same-repo PR만 실행
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      # 프로젝트 스택 설정 — 기술 스택에 맞게 주석 해제
      # - uses: actions/setup-node@v4
      #   with: { node-version: "20", cache: "npm" }
      # - run: npm ci
      #
      # - uses: actions/setup-python@v5
      #   with: { python-version: "3.12", cache: "pip" }
      # - run: pip install -r requirements.txt
      #
      # - uses: actions/setup-go@v5
      #   with: { go-version: "1.22" }

      - name: WIP Task acceptance 명령 실행
        shell: bash
        run: |
          python3 - <<'PY' > /tmp/wip-acceptance.tsv
          import json

          with open("tasks/index.json", encoding="utf-8") as fh:
              tasks = json.load(fh).get("tasks", [])
          for task in tasks:
              if task.get("status") == "wip":
                  acceptance = task.get("acceptance", "").strip()
                  print(f"{task['id']}\t{acceptance}")
          PY

          if [ ! -s /tmp/wip-acceptance.tsv ]; then
            echo "WIP Task 없음 — skip"
            exit 0
          fi

          failed=0
          while IFS=$'\t' read -r task_id acceptance; do
            if [ -z "$acceptance" ] || [ "$acceptance" = "-" ]; then
              echo "⚠ Task ${task_id}: acceptance 없음 — skip"
              continue
            fi

            echo "▶ Task ${task_id}: $acceptance"
            if eval "$acceptance"; then
              echo "✓ Task ${task_id}: PASS"
            else
              echo "✗ Task ${task_id}: FAIL — acceptance 명령이 실패했습니다"
              failed=1
            fi
          done < /tmp/wip-acceptance.tsv
          exit $failed

  granularity-check:
    name: Task Granularity
    needs: validate-tasks
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: wip Task 세분화 기준 확인
        run: |
          python3 - <<'PY'
          import json
          import re
          import sys

          vague_re = re.compile(r"(전체|모든| 및 |그리고)")
          with open("tasks/index.json", encoding="utf-8") as fh:
              tasks = json.load(fh).get("tasks", [])

          failed = False
          wip_found = False
          for task in tasks:
              if task.get("status") != "wip":
                  continue
              wip_found = True
              reasons = []
              if not task.get("dod", "").strip():
                  reasons.append("DoD 미기재")
              if "depends" not in task:
                  reasons.append("Depends 키 미기재")
              match = vague_re.search(task.get("title", ""))
              if match:
                  reasons.append(f"내용에 뭉뚱그린 표현 감지: {match.group(1)}")
              if reasons:
                  print(f"✗ Task {task['id']}: 세분화 기준 미달 — {', '.join(reasons)}")
                  failed = True
              else:
                  print(f"✓ Task {task['id']}: 세분화 기준 통과")

          if not wip_found:
              print("WIP Task 없음 — skip")
          sys.exit(1 if failed else 0)
          PY

  depends-check:
    name: Depends 검증
    needs: validate-tasks
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: WIP Task의 Depends 완료 여부 확인
        run: python3 scripts/validate_tasks.py
