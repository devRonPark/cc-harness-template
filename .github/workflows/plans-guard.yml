name: Plans Guard

on:
  pull_request:
    branches: [main]

concurrency:
  group: plans-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wip-branch-check:
    name: WIP↔Branch
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: WIP Task에 해당 브랜치 존재 확인
        shell: bash
        run: |
          if [ ! -f Plans.md ]; then
            echo "Plans.md 없음 — skip"
            exit 0
          fi

          wip_lines=$(grep 'cc:WIP' Plans.md || true)
          if [ -z "$wip_lines" ]; then
            echo "WIP Task 없음 — OK"
            exit 0
          fi

          failed=0
          while IFS='|' read -ra fields; do
            task_id=$(echo "${fields[1]}" | tr -d ' ')
            # Task ID 형식이 숫자.숫자인 경우만 처리 (헤더 행 등 skip)
            if ! echo "$task_id" | grep -qE '^[0-9]+\.[0-9]+$'; then
              continue
            fi
            if git ls-remote --heads origin | grep -q "refs/heads/task/${task_id}-"; then
              echo "✓ Task ${task_id}: 브랜치 존재"
            else
              echo "✗ Task ${task_id}: task/${task_id}-* 브랜치 없음 (harness-work가 브랜치를 생성했는지 확인)"
              failed=1
            fi
          done <<< "$wip_lines"

          exit $failed

  acceptance-check:
    name: Acceptance Oracle
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # 프로젝트 스택 설정 — 기술 스택에 맞게 주석 해제
      # - uses: actions/setup-node@v4
      #   with: { node-version: "20", cache: "npm" }
      # - run: npm ci
      #
      # - uses: actions/setup-python@v5
      #   with: { python-version: "3.12", cache: "pip" }
      # - run: pip install -r requirements.txt
      #
      # - uses: actions/setup-go@v5
      #   with: { go-version: "1.22" }

      - name: WIP Task acceptance 명령 실행
        shell: bash
        run: |
          if [ ! -f Plans.md ]; then
            echo "Plans.md 없음 — skip"
            exit 0
          fi

          failed=0
          wip_found=0

          while IFS= read -r line; do
            # 구분자 행·주석 행·파이프 없는 행 skip
            [[ "$line" =~ ^[[:space:]]*\|[[:space:]]*[-:] ]] && continue
            [[ "$line" != *"|"* ]] && continue

            IFS='|' read -ra fields <<< "$line"
            # 컬럼: 0=빈칸 1=Task 2=내용 3=DoD 4=Acceptance 5=Depends 6=Status 7=GH
            [ "${#fields[@]}" -lt 7 ] && continue

            task_id=$(echo "${fields[1]}" | xargs)
            acceptance=$(echo "${fields[4]}" | xargs)
            status=$(echo "${fields[6]}" | xargs)

            # Task ID 형식 (숫자.숫자) + cc:WIP 행만 처리
            [[ ! "$task_id" =~ ^[0-9]+\.[0-9]+$ ]] && continue
            [[ "$status" != "cc:WIP" ]] && continue

            wip_found=$((wip_found + 1))

            if [ -z "$acceptance" ] || [ "$acceptance" = "-" ]; then
              echo "⚠ Task ${task_id}: acceptance 없음 — skip"
              continue
            fi

            echo "▶ Task ${task_id}: $acceptance"
            if eval "$acceptance"; then
              echo "✓ Task ${task_id}: PASS"
            else
              echo "✗ Task ${task_id}: FAIL — acceptance 명령이 실패했습니다"
              failed=1
            fi
          done < Plans.md

          if [ "$wip_found" -eq 0 ]; then
            echo "WIP Task 없음 — skip"
          fi

          exit $failed
