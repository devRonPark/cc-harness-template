name: Plans Guard

on:
  pull_request:
    branches: [main]

concurrency:
  group: plans-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-tasks:
    name: tasks/index.json 검증
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Task JSON 스키마·의존성 검증
        run: python3 scripts/validate_tasks.py

  plans-sync-check:
    name: Plans.md sync 검증
    needs: validate-tasks
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Plans.md가 tasks/index.json에서 생성된 최신 snapshot인지 확인
        run: python3 scripts/sync_plans.py --check
